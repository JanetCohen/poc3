<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta postMessage Passive Monitor</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

pre{
    background:#020617;
    border-radius:8px;
    padding:15px;
    max-height:500px;
    overflow:auto;
    white-space:pre-wrap;
}

button{
    padding:10px 15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>Meta Artifact Message Monitor</h1>

<p><strong>Origin:</strong> <span id="origin"></span></p>

<p><strong>Frame:</strong> <span id="frame"></span></p>

<p><strong>Parent:</strong> <span id="parent"></span></p>

<button onclick="clearLog()">Clear Log</button>

</div>

<div class="card">

<h2>Captured Messages</h2>

<pre id="log"></pre>

</div>

<script>

const logBox = document.getElementById("log");

function log(msg){

    const time =
        new Date().toLocaleTimeString();

    const line =
        `[${time}] ${msg}\n`;

    console.log(msg);

    logBox.textContent += line;

    logBox.scrollTop =
        logBox.scrollHeight;
}

function clearLog(){

    logBox.textContent = "";

    log("Log cleared.");
}

document.getElementById("origin").textContent =
    location.origin;

document.getElementById("frame").textContent =
    (window.top === window)
        ? "TOP"
        : "IFRAME";

try{

    document.getElementById("parent").textContent =
        parent.location.origin;

}catch{

    document.getElementById("parent").textContent =
        "Blocked by SOP";
}

log("Monitor started.");

window.addEventListener("message", function(event){

    log("MESSAGE RECEIVED");

    log("Origin: " + event.origin);

    try{

        log("Data: " +
            JSON.stringify(event.data));

    }catch{

        log("Data: [unserializable]");
    }

    if(
        event.data &&
        typeof event.data === "object"
    ){

        log(
            "Keys: " +
            Object.keys(event.data).join(", ")
        );

        /*
         * Passive handshake acknowledgement.
         * Only acknowledges the exact
         * registerAsChildFrame message
         * already observed.
         */

        if(
            event.data.command ===
            "registerAsChildFrame"
        ){

            log(
                "Handshake observed."
            );

            const response = {

                command:
                    "registerAsChildFrameAck",

                remoteFrameId:
                    event.data.remoteFrameId
            };

            try{

                event.source.postMessage(
                    response,
                    event.origin
                );

                log(
                    "Handshake ACK sent."
                );

            }catch(e){

                log(
                    "ACK failed: " +
                    e.message
                );
            }
        }
    }
});

</script>

</body>
</html>
