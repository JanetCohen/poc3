<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artifact postMessage Monitor</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    .card {
        background: #1e293b;
        border: 2px solid #3b82f6;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        font-weight: bold;
    }

    .blue { background: #2563eb; color: white; }
    .green { background: #16a34a; color: white; }
    .red { background: #dc2626; color: white; }

    pre {
        background: #020617;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 15px;
        overflow: auto;
        max-height: 400px;
        white-space: pre-wrap;
        word-break: break-word;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 8px;
        border-bottom: 1px solid #334155;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Artifact Security Monitor</h1>
    <p>Diagnostic page for observing postMessage behavior.</p>
</div>

<div class="card">
    <h2>Environment Information</h2>

    <table>
        <tr>
            <td>location.origin</td>
            <td id="origin"></td>
        </tr>

        <tr>
            <td>document.domain</td>
            <td id="domain"></td>
        </tr>

        <tr>
            <td>window.top === window</td>
            <td id="frame"></td>
        </tr>

        <tr>
            <td>document.cookie.length</td>
            <td id="cookie"></td>
        </tr>

        <tr>
            <td>localStorage.length</td>
            <td id="local"></td>
        </tr>

        <tr>
            <td>sessionStorage.length</td>
            <td id="session"></td>
        </tr>

        <tr>
            <td>parent.location.origin</td>
            <td id="parent-origin"></td>
        </tr>
    </table>
</div>

<div class="card">
    <h2>postMessage Tests</h2>

    <button class="blue" onclick="sendPing()">
        Send Ping
    </button>

    <button class="green" onclick="sendHello()">
        Send Hello
    </button>

    <button class="red" onclick="clearLog()">
        Clear Log
    </button>
</div>

<div class="card">
    <h2>Event Log</h2>

    <pre id="log"></pre>
</div>

<script>

const logBox = document.getElementById("log");

function addLog(msg) {

    const time = new Date().toLocaleTimeString();

    const line = `[${time}] ${msg}\n`;

    console.log(msg);

    logBox.textContent += line;

    logBox.scrollTop = logBox.scrollHeight;
}

function clearLog() {

    logBox.textContent = "";

    addLog("Log cleared.");
}

/* ENVIRONMENT */

document.getElementById("origin").textContent =
    location.origin;

document.getElementById("domain").textContent =
    document.domain;

document.getElementById("frame").textContent =
    (window.top === window);

document.getElementById("cookie").textContent =
    document.cookie.length;

document.getElementById("local").textContent =
    localStorage.length;

document.getElementById("session").textContent =
    sessionStorage.length;

/* PARENT ORIGIN TEST */

try {

    document.getElementById("parent-origin").textContent =
        parent.location.origin;

} catch (e) {

    document.getElementById("parent-origin").textContent =
        "Blocked by SOP";
}

/* RECEIVE */

window.addEventListener("message", function(event) {

    addLog("MESSAGE RECEIVED");

    addLog("Origin: " + event.origin);

    try {

        addLog("Data: " +
            JSON.stringify(event.data));

    } catch {

        addLog("Data: " +
            String(event.data));
    }

});

/* SEND */

function sendPing() {

    const payload = {

        type: "artifact_ping",

        timestamp: Date.now()
    };

    parent.postMessage(payload, "*");

    addLog("PING SENT");

    addLog(JSON.stringify(payload));
}

function sendHello() {

    const payload = {

        type: "artifact_hello",

        source: location.origin,

        timestamp: Date.now()
    };

    parent.postMessage(payload, "*");

    addLog("HELLO SENT");

    addLog(JSON.stringify(payload));
}

/* HEARTBEAT */

setInterval(function() {

    const payload = {

        type: "artifact_heartbeat",

        timestamp: Date.now()
    };

    parent.postMessage(payload, "*");

    addLog("HEARTBEAT SENT");

}, 15000);

/* START */

addLog("Monitor started.");

addLog("Origin: " + location.origin);

addLog("Top window: " +
    (window.top === window));

</script>

</body>
</html>
